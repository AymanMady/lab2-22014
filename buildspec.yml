version: 0.2
phases:
  install:
    runtime-versions:
      java: corretto8
    commands:
      # Le 'yum install maven' d'Amazon Linux 2 fournit Maven 3.0.5, trop ancien
      # pour maven-compiler-plugin 3.11.0 / maven-war-plugin 3.4.0 (exigent Maven >= 3.2.5).
      # On installe donc un Maven recent.
      - curl -fsSL https://archive.apache.org/dist/maven/maven-3/3.9.9/binaries/apache-maven-3.9.9-bin.tar.gz -o /tmp/maven.tgz
      - tar -xzf /tmp/maven.tgz -C /opt
      - export PATH=/opt/apache-maven-3.9.9/bin:$PATH
      - mvn -v
  build:
    commands:
      - export PATH=/opt/apache-maven-3.9.9/bin:$PATH
      - mvn clean install
      - mvn package
      - mkdir output
      - cp target/*.war output/

artifacts:
  files:
    - output/*.war
    - appspec.yml
    - scripts/*
    - install_dependencies.sh
    - start_server.sh
    - stop_server.sh
